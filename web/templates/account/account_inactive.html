{% extends 'base.html' %}

{% load i18n %}

{% block head_title %}
  {% trans 'Account Inactive' %}
{% endblock %}

{% block content %}
  <style>
    /* Background  */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    
    body {
      background-image: url('/static/img/Login_Backround.png') !important;
      background-size: cover !important;
      background-position: center center !important;
      background-repeat: no-repeat !important;
      background-attachment: fixed !important;
      background-color: #0f1117 !important;
    }
    
    /* Card blur */
    .card {
      background: rgba(15, 17, 23, 0.5) !important;
      backdrop-filter: blur(6px) !important;
      -webkit-backdrop-filter: blur(6px) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
    }
  </style>
  <div class="m-0 start-0 top-0 d-flex p-2 w-100 justify-content-center align-items-center flex-column position-absolute" style="min-height: 100vh;">
    <div class="card shadow-lg border-0 p-4" style="max-width:820px; border-radius:15px;">
      <h1>{% trans 'Account Inactive' %}</h1>

      <p>
        {% trans 'This account is inactive. Please contact admin for assistance.' %}
      </p>
      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-secondary w-100 mt-2 py-2"><i class="fa-solid fa-arrow-left-long pe-2"></i>{% trans 'Back to Login' %}</button>
      </form>
    </div>
  </div>
{% endblock %}
